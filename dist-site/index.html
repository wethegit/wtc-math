<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wtc-math — playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/wtc-math/assets/index-BE6shW_7.js"></script>
  <link rel="stylesheet" crossorigin href="/wtc-math/assets/index-dfMPtagi.css">
</head>
<body>
  <header>
    <div class="wordmark">
      <span class="w-lib">wtc</span><span class="w-dot">·</span><span class="w-mod">math</span>
    </div>
    <p class="header-desc">Interactive playground — vectors, matrices, quaternions</p>
    <a class="header-docs" href="./docs/index.html">docs ↗</a>
  </header>

  <nav class="tab-nav" role="tablist">
    <button class="tab-btn" role="tab" data-tab="0">Vec2</button>
    <button class="tab-btn" role="tab" data-tab="1">Vec3</button>
    <button class="tab-btn" role="tab" data-tab="2">Vec4</button>
    <button class="tab-btn" role="tab" data-tab="3">Mat2</button>
    <button class="tab-btn" role="tab" data-tab="4">Mat3</button>
    <button class="tab-btn" role="tab" data-tab="5">Mat4</button>
    <button class="tab-btn" role="tab" data-tab="6">Quat</button>
  </nav>

  <main class="main">
    <div class="col-left">
      <div class="tab-desc" id="tab-desc"></div>
      <div class="examples" id="examples" role="list"></div>

      <div class="tryit">
        <div class="tryit-header">
          <span class="tryit-label">try it</span>
          <span class="tryit-hint">all classes available in scope</span>
        </div>
        <textarea class="tryit-input" id="tryit-input" spellcheck="false" rows="2"></textarea>
        <div class="tryit-output">
          <span class="output-prompt">›</span>
          <span class="output-value" id="output-value">—</span>
        </div>
      </div>
    </div>

    <div class="col-right">
      <div class="canvas-wrap">
        <canvas id="canvas"></canvas>
      </div>
      <div class="canvas-legend" id="canvas-legend"></div>
    </div>
  </main>

</body>
</html>
